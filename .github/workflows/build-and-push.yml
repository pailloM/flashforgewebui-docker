name: Build and Push Docker image

on:
  release:
    types: [published, edited]
  push:
    tags:
      - 'v*'        # optional: trigger on tag pushes like v1.2.3
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flashforge-webui-docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag to publish
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            if [ -z "$TAG" ]; then
              TAG="latest"
            fi
          else
            # On push events, extract tag from GITHUB_REF if present
            REF="${GITHUB_REF:-}"
            if [[ "$REF" == refs/tags/* ]]; then
              TAG="${REF#refs/tags/}"
            else
              TAG="latest"
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            TAG=${{ steps.tag.outputs.tag }}

      - name: Image digest
        run: |
          echo "Pushed images:"
          docker manifest inspect ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} || true
