name: Build and Push Docker image

on:
  release:
    types: [published, edited]
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * *'   # nightly at 03:00 UTC
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      REPO_NAME: flashforge-webui-docker
      UPSTREAM_REPO: Parallel-7/FlashForgeWebUI
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase owner and image name
        id: owner
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER:-${GITHUB_ACTOR}}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ env.REGISTRY }}/${OWNER_LOWER}/${{ env.REPO_NAME }}"
          echo "owner_lower=$OWNER_LOWER" >> "$GITHUB_OUTPUT"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Get latest upstream release tag
        id: upstream
        run: |
          set -eux
          API="https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest"
          TAG="$(curl -sSfL $API | jq -r .tag_name)"
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No upstream release tag found; aborting."
            echo "tag=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}

      - name: Stop if no upstream release
        if: steps.upstream.outputs.tag == 'none'
        run: echo "No upstream release found, exiting."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image for upstream tag already exists in registry
        id: check_image
        run: |
          set -eux
          IMAGE="${{ steps.owner.outputs.image_name }}:${{ steps.upstream.outputs.tag }}"
          echo "Checking for existing image: $IMAGE"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE already exists — aborting workflow."
            exit 0
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image does not exist — will build and push."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.check_image.outputs.exists == 'false' || steps.check_image.outputs.exists == ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.owner.outputs.image_name }}:${{ steps.upstream.outputs.tag }}
            ${{ steps.owner.outputs.image_name }}:latest
          build-args: |
            TAG=${{ steps.upstream.outputs.tag }}

      - name: Image digest
        if: steps.check_image.outputs.exists == 'false' || steps.check_image.outputs.exists == ''
        run: |
          echo "Pushed images:"
          docker manifest inspect ${{ steps.owner.outputs.image_name }}:${{ steps.upstream.outputs.tag }} || true
